$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Image
description: 'A responsive image component leveraging Bootstrap utility classes for aspect-ratio cropping, configurable corner rounding, and integrated link/caption support.'
group: Canvas Bootstrap
props:
  type: object
  properties:
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      description: 'The source image file. Uses object-fit: cover to ensure the image fills the selected aspect ratio container.'
      type: object
      examples:
        - src: "assets/pexels-alyona-nagel.jpg"
          alt: "Image alt text"
          width: 1920
          height: 1014
    size:
      title: Aspect ratio
      description: 'Sets the container proportions using Bootstrap "ratio" classes. The image will be cropped to fit these dimensions.'
      type: string
      enum:
        - 16:9
        - 4:3
        - 1:1
      meta:enum:
        16:9: "16:9 Widescreen"
        4:3: "4:3 Standard"
        1:1: "1:1 Square"
      default: "4:3"
      examples:
        - "4:3"
    width_class:
      type: string
      title: Width
      description: Bootstrap width utility class for the image container.
      default: w-100
      enum:
        - w-25
        - w-50
        - w-75
        - w-100
        - w-auto
        - mw-100
      meta:enum:
        w-25: "W-25"
        w-50: "W-50"
        w-75: "W-75"
        w-100: "W-100"
        w-auto: "W-auto"
        mw-100: "Mw-100"
    height_class:
      type: string
      title: Height
      description: Bootstrap height utility class for the image container.
      default: none
      enum:
        - h-25
        - h-50
        - h-75
        - h-100
        - h-auto
        - mh-100
      meta:enum:
        h-25: "H-25"
        h-50: "H-50"
        h-75: "H-75"
        h-100: "H-100"
        h-auto: "H-auto"
        mh-100: "Mh-100"
    radius:
      type: string
      title: Corner radius
      description: 'Applies Bootstrap "rounded" classes and overflow-hidden to the image container.'
      default: rounded-0
      enum:
        - rounded-0
        - small
        - large
        - extra-large
      meta:enum:
        rounded-0: Not rounded
        small: "Small (rounded-1)"
        large: "Large (rounded-3)"
        extra-large: "Extra Large (rounded-4)"
      examples: ["rounded-0"]
    caption:
      title: Caption
      description: 'Text displayed in a figcaption element below the image using Bootstrap text-muted styling.'
      type: string
    url:
      type: string
      title: Link URL
      description: 'If provided, wraps the image in an anchor tag. Leave empty to display as a static image.'
    margin_all:
      type: string
      title: Margin
      description: Bootstrap margin class for the figure.
      default: m-0
      enum:
        - m-0
        - m-1
        - m-2
        - m-3
        - m-4
        - m-5
      meta:enum:
        m-0: "M-0"
        m-1: "M-1"
        m-2: "M-2"
        m-3: "M-3"
        m-4: "M-4"
        m-5: "M-5"
    margin_top:
      type: string
      title: Margin top
      description: Bootstrap margin-top class for the figure.
      default: mt-0
      enum:
        - mt-0
        - mt-1
        - mt-2
        - mt-3
        - mt-4
        - mt-5
      meta:enum:
        mt-0: "Mt-0"
        mt-1: "Mt-1"
        mt-2: "Mt-2"
