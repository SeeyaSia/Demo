$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json

name: Accordion item
description: A collapsible item designed to be used inside an accordion container.
type: component
status: experimental
group: Canvas Bootstrap

props:
  type: object
  required:
    - heading_level
  properties:
    title:
      type: string
      title: Heading
      examples:
        - Section title
    heading_level:
      type: number
      enum: [2, 3, 4, 5, 6]
      title: Heading level
      examples:
        - 3
    open_by_default:
      type: boolean
      title: Expanded by default
      default: false
      examples:
        - false

slots:
  accordion_body:
    title: Accordion body
    description: Content shown when expanded
