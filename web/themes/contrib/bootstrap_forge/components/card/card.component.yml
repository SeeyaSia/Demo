        - align-items-lg-center
        - align-items-lg-baseline
        - align-items-lg-stretch
      meta:enum:
        align-items-lg-start: "Align-items-lg-start"
        align-items-lg-end: "Align-items-lg-end"
        align-items-lg-center: "Align-items-lg-center"
        align-items-lg-baseline: "Align-items-lg-baseline"
        align-items-lg-stretch: "Align-items-lg-stretch"
    body_align_items_xl:
      type: string
      title: Align items (xl)
      default: none
      enum:
        - align-items-xl-start
        - align-items-xl-end
        - align-items-xl-center
        - align-items-xl-baseline
        - align-items-xl-stretch
      meta:enum:
        align-items-xl-start: "Align-items-xl-start"
        align-items-xl-end: "Align-items-xl-end"
        align-items-xl-center: "Align-items-xl-center"
        align-items-xl-baseline: "Align-items-xl-baseline"
        align-items-xl-stretch: "Align-items-xl-stretch"
    body_align_items_xxl:
      type: string
      title: Align items (xxl)
      default: none
      enum:
        - align-items-xxl-start
        - align-items-xxl-end
        - align-items-xxl-center
        - align-items-xxl-baseline
        - align-items-xxl-stretch
      meta:enum:
        align-items-xxl-start: "Align-items-xxl-start"
        align-items-xxl-end: "Align-items-xxl-end"
        align-items-xxl-center: "Align-items-xxl-center"
        align-items-xxl-baseline: "Align-items-xxl-baseline"
        align-items-xxl-stretch: "Align-items-xxl-stretch"
slots:
  card_header:
    title: Card header
    description: Card header content slot.
    required: false
  card_image:
    title: Card image
    description: Card image slot (uses card-img-top/card-img-bottom in vertical layout).
    required: false
  card_body:
    title: Card body
    description: Card body content slot.
    required: false
  card_footer:
    title: Card footer
    description: Card footer content slot.
    required: false

canvas_bootstrap:
  ui_groups:
    Card:
      weight: 10
      groups:
        Structure:
          weight: 0
          fields:
            - image_rounding
            - image_wrapper_class
            - reverse_order
            - show_header
            - show_image
            - show_footer
            - body_orientation
            - body_orientation_sm
            - body_orientation_md
            - body_orientation_lg
            - body_orientation_xl
            - body_orientation_xxl
        Style:
          weight: 10
          fields:
            - position
            - card_rounding
            - border_color
            - bg_color
            - card_class
    Header:
      weight: 30
      groups:
        Header:
          weight: 0
          fields:
            - header_class
    Body:
      weight: 40
      groups:
        Body:
          weight: 0
          fields:
            - body_class
        Flex:
          weight: 20
          fields:
            - body_justify_content
            - body_justify_content_sm
            - body_justify_content_md
            - body_justify_content_lg
            - body_justify_content_xl
            - body_justify_content_xxl
            - body_align_items
            - body_align_items_sm
            - body_align_items_md
            - body_align_items_lg
            - body_align_items_xl
            - body_align_items_xxl
    Footer:
      weight: 50
      groups:
        Footer:
          weight: 0
          fields:
            - footer_class
