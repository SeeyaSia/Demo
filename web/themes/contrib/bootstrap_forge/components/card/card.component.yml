"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Card
description: Bootstrap card with optional header, image, body, and footer slots.
type: component
status: stable
group: Canvas Bootstrap

props:
  type: object
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Attributes
      description: Card wrapper attributes.
    show_header:
      type: boolean
      title: Show header
      description: Toggle rendering of the card header slot.
      default: true
      examples: [true]
    show_image:
      type: boolean
      title: Show image
      description: Toggle rendering of the card image slot.
      default: true
      examples: [true]
    show_footer:
      type: boolean
      title: Show footer
      description: Toggle rendering of the card footer slot.
      default: true
      examples: [true]
    reverse_order:
      type: boolean
      title: Reverse image/body order
      description: Place the image after the body (uses flex order for horizontal).
      default: false
    image_rounding:
      type: string
      title: Image rounding class
      description: Bootstrap card image class for rounded corners (top/bottom). Does not control order.
      default: card-img-top
      enum:
        - card-img-top
        - card-img-bottom
      meta:enum:
        card-img-top: Top corners rounded
        card-img-bottom: Bottom corners rounded
    image_wrapper_class:
      type: string
      title: Image wrapper classes
      description: Additional classes for the card image wrapper.
      default: ''
      examples: ["card-img-top"]
    position:
      type: string
      title: Position
      description: Position utility class for the card.
      default: static
      enum:
        - static
        - relative
        - absolute
      meta:enum:
        static: "Static"
        relative: "Relative"
        absolute: "Absolute"
    card_rounding:
      type: string
      title: Card rounding
      description: Choose a Bootstrap rounded class.
      default: none
      enum:
        - rounded-0
        - rounded-1
        - rounded-2
        - rounded-3
        - rounded-4
        - rounded-5
        - rounded-pill
      meta:enum:
        rounded-0: "Rounded-0"
        rounded-1: "Rounded-1"
        rounded-2: "Rounded-2"
        rounded-3: "Rounded-3"
        rounded-4: "Rounded-4"
        rounded-5: "Rounded-5"
        rounded-pill: "Rounded-pill"
    border_color:
      type: string
      title: Border color
      description: Bootstrap border color utility class.
      default: none
      enum:
        - border-primary
        - border-secondary
        - border-success
        - border-danger
        - border-warning
        - border-info
        - border-light
        - border-dark
        - border-white
      meta:enum:
        border-primary: "Border-primary"
        border-secondary: "Border-secondary"
        border-success: "Border-success"
        border-danger: "Border-danger"
        border-warning: "Border-warning"
        border-info: "Border-info"
        border-light: "Border-light"
        border-dark: "Border-dark"
        border-white: "Border-white"
    bg_color:
      type: string
      title: Background color
      description: Bootstrap background utility class.
      default: none
      enum:
        - bg-primary
        - bg-secondary
        - bg-success
        - bg-danger
        - bg-warning
        - bg-info
        - bg-light
        - bg-dark
        - bg-body
        - bg-white
        - bg-transparent
      meta:enum:
        bg-primary: "Bg-primary"
        bg-secondary: "Bg-secondary"
        bg-success: "Bg-success"
        bg-danger: "Bg-danger"
        bg-warning: "Bg-warning"
        bg-info: "Bg-info"
        bg-light: "Bg-light"
        bg-dark: "Bg-dark"
        bg-body: "Bg-body"
        bg-white: "Bg-white"
        bg-transparent: "Bg-transparent"
    card_class:
      type: string
      title: Card classes
      description: Additional classes for the card wrapper.
      default: ''
    header_class:
      type: string
      title: Header classes
      description: Additional classes for the card header.
      default: ''
    body_class:
      type: string
      title: Body classes
      description: Additional classes for the card body.
      default: ''
    footer_class:
      type: string
      title: Footer classes
      description: Additional classes for the card footer.
      default: ''
    custom_class:
      type: string
      title: Custom classes
      description: Additional classes to add to the card wrapper.
      default: ''
    body_orientation:
      type: string
      title: Card orientation
      description: Horizontal or vertical layout for the card image/body region.
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_orientation_sm:
      type: string
      title: Card orientation (sm)
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_orientation_md:
      type: string
      title: Card orientation (md)
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_orientation_lg:
      type: string
      title: Card orientation (lg)
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_orientation_xl:
      type: string
      title: Card orientation (xl)
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_orientation_xxl:
      type: string
      title: Card orientation (xxl)
      default: none
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: "Vertical"
        horizontal: "Horizontal"
    body_justify_content:
      type: string
      title: Justify content
      default: none
      enum:
        - justify-content-start
        - justify-content-end
        - justify-content-center
        - justify-content-between
        - justify-content-around
        - justify-content-evenly
      meta:enum:
        justify-content-start: "Justify-content-start"
        justify-content-end: "Justify-content-end"
        justify-content-center: "Justify-content-center"
        justify-content-between: "Justify-content-between"
        justify-content-around: "Justify-content-around"
        justify-content-evenly: "Justify-content-evenly"
    body_justify_content_sm:
      type: string
      title: Justify content (sm)
      default: none
      enum:
        - justify-content-sm-start
        - justify-content-sm-end
        - justify-content-sm-center
        - justify-content-sm-between
        - justify-content-sm-around
        - justify-content-sm-evenly
      meta:enum:
        justify-content-sm-start: "Justify-content-sm-start"
        justify-content-sm-end: "Justify-content-sm-end"
        justify-content-sm-center: "Justify-content-sm-center"
        justify-content-sm-between: "Justify-content-sm-between"
        justify-content-sm-around: "Justify-content-sm-around"
        justify-content-sm-evenly: "Justify-content-sm-evenly"
    body_justify_content_md:
      type: string
      title: Justify content (md)
      default: none
      enum:
        - justify-content-md-start
        - justify-content-md-end
        - justify-content-md-center
        - justify-content-md-between
        - justify-content-md-around
        - justify-content-md-evenly
      meta:enum:
        justify-content-md-start: "Justify-content-md-start"
        justify-content-md-end: "Justify-content-md-end"
        justify-content-md-center: "Justify-content-md-center"
        justify-content-md-between: "Justify-content-md-between"
        justify-content-md-around: "Justify-content-md-around"
        justify-content-md-evenly: "Justify-content-md-evenly"
    body_justify_content_lg:
      type: string
      title: Justify content (lg)
      default: none
      enum:
        - justify-content-lg-start
        - justify-content-lg-end
        - justify-content-lg-center
        - justify-content-lg-between
        - justify-content-lg-around
        - justify-content-lg-evenly
      meta:enum:
        justify-content-lg-start: "Justify-content-lg-start"
        justify-content-lg-end: "Justify-content-lg-end"
        justify-content-lg-center: "Justify-content-lg-center"
        justify-content-lg-between: "Justify-content-lg-between"
        justify-content-lg-around: "Justify-content-lg-around"
        justify-content-lg-evenly: "Justify-content-lg-evenly"
    body_justify_content_xl:
      type: string
      title: Justify content (xl)
      default: none
      enum:
        - justify-content-xl-start
        - justify-content-xl-end
        - justify-content-xl-center
        - justify-content-xl-between
        - justify-content-xl-around
        - justify-content-xl-evenly
      meta:enum:
        justify-content-xl-start: "Justify-content-xl-start"
        justify-content-xl-end: "Justify-content-xl-end"
        justify-content-xl-center: "Justify-content-xl-center"
        justify-content-xl-between: "Justify-content-xl-between"
        justify-content-xl-around: "Justify-content-xl-around"
        justify-content-xl-evenly: "Justify-content-xl-evenly"
    body_justify_content_xxl:
      type: string
      title: Justify content (xxl)
      default: none
      enum:
        - justify-content-xxl-start
        - justify-content-xxl-end
        - justify-content-xxl-center
        - justify-content-xxl-between
        - justify-content-xxl-around
        - justify-content-xxl-evenly
      meta:enum:
        justify-content-xxl-start: "Justify-content-xxl-start"
        justify-content-xxl-end: "Justify-content-xxl-end"
        justify-content-xxl-center: "Justify-content-xxl-center"
        justify-content-xxl-between: "Justify-content-xxl-between"
        justify-content-xxl-around: "Justify-content-xxl-around"
        justify-content-xxl-evenly: "Justify-content-xxl-evenly"
    body_align_items:
      type: string
      title: Align items
      default: none
      enum:
        - align-items-start
        - align-items-end
        - align-items-center
        - align-items-baseline
        - align-items-stretch
      meta:enum:
        align-items-start: "Align-items-start"
