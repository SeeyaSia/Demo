slots:
  row:
    title: Row
    required: true
    description: Column components

canvas_bootstrap:
  ui_groups:
    Gaps:
      weight: 10
      groups:
        All gaps:
          weight: 0
          fields:
            - gap
            - gap_sm
            - gap_md
            - gap_lg
            - gap_xl
            - gap_xxl
        Horizontal gaps:
          weight: 10
          fields:
            - gap_x
            - gap_x_sm
            - gap_x_md
            - gap_x_lg
            - gap_x_xl
            - gap_x_xxl
        Vertical gaps:
          weight: 20
          fields:
            - gap_y
            - gap_y_sm
            - gap_y_md
            - gap_y_lg
            - gap_y_xl
            - gap_y_xxl
    Columns:
      weight: 20
      fields:
        - row_cols
        - row_cols_sm
        - row_cols_md
        - row_cols_lg
        - row_cols_xl
        - row_cols_xxl
