"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Accordion container
description: A wrapper component for grouping multiple accordion items with optional "flush" styling.
type: component
status: stable
group: Canvas Bootstrap

props:
  type: object
  properties:
    flush:
      type: boolean
      title: Flush accordion
      description: Remove default background, borders, and rounded corners.
      default: false
    custom_class:
      type: string
      title: Custom classes
      description: Additional classes to add to the accordion container.
      default: ''

slots:
  accordion_content:
    title: Accordion items
    description: Add accordion item components here
